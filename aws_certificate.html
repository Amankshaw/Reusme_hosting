<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS Certified Solutions Architect - Associate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #091a22;
      --card: #102a36;
      --text: #e8f3f1;
      --muted: #a9bfba;
      --accent2: #ffcb75;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 0%, rgba(24, 199, 163, 0.22), transparent 32%),
                  radial-gradient(circle at 88% 8%, rgba(255, 203, 117, 0.2), transparent 30%),
                  linear-gradient(145deg, #07151c 0%, #0f2632 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(980px, 100%);
      background: rgba(16, 42, 54, 0.85);
      border: 1px solid rgba(143, 211, 192, 0.3);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }
    h1 {
      color: var(--accent2);
      margin-bottom: 14px;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
    }
    .cert-frame {
      border: 1px solid rgba(143, 211, 192, 0.36);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      overflow: hidden;
    }
    .cert-frame img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      display: block;
    }
    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 600;
    }
    .back {
      color: #ffdfac;
      border: 1px solid rgba(255, 203, 117, 0.45);
      background: rgba(255, 203, 117, 0.08);
    }
    .download {
      color: #d6fff5;
      border: 1px solid rgba(24, 199, 163, 0.52);
      background: rgba(24, 199, 163, 0.12);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>AWS Certified Solutions Architect - Associate</h1>
    <section class="cert-frame">
      <img src="./aws_certificate.jpg" alt="AWS Certified Solutions Architect Associate certificate" />
    </section>
    <div class="actions">
      <a class="btn download" href="./aws_certificate.jpg" download="Aman_Kumar_Shaw_AWS_Certified_Solutions_Architect_Associate.jpg">Download Certificate</a>
      <a class="btn back" href="./index.html">Back to Resume</a>
    </div>
  </main>
</body>
</html>
